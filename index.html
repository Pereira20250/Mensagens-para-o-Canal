<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mensagens Diárias</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg,#fff7ed,#fde68a);
    }

    .container {
      max-width: 800px;
      margin: auto;
      padding: 20px;
    }

    h1 { text-align:center; }

    .btn {
      display:block;
      margin:20px auto;
      padding:12px;
      background:#f59e0b;
      color:#fff;
      border:none;
      border-radius:10px;
      cursor:pointer;
      font-weight:bold;
    }

    .card {
      background:#fff;
      padding:15px;
      border-radius:12px;
      margin-bottom:15px;
      box-shadow:0 5px 15px rgba(0,0,0,0.1);
    }

    .copy-btn {
      width:100%;
      padding:10px;
      background:#111;
      color:#fff;
      border:none;
      border-radius:8px;
      cursor:pointer;
    }

    .msg { white-space: pre-line; margin-bottom:10px; }
  </style>
</head>

<body>

<div class="container">
  <h1>Mensagens Diárias ✨</h1>
  <button class="btn" onclick="gerar()">Gerar mensagens</button>
  <div id="lista"></div>
</div>

<script>

const mensagens = [

`Deus nunca perde o controle da sua vida.
Mesmo quando tudo parece fora do lugar, Ele continua trabalhando. 🙏✨`,

`Você não está sozinho.
Deus está com você em todos os momentos. 🤍🔥`,

`A sua fé está construindo o seu futuro.
Não desista. 🙌✨`,

`Deus transforma dor em testemunho.
Permaneça firme. 🔥`,

`Caminhe com Deus todos os dias.
Ele guia seus passos. 🚶‍♂️🙏`,

`O silêncio de Deus também é cuidado.
Confie. 🤫✨`,

`Deus te chamou para perseverar.
Não desista agora. 🔥🙏`,

`Você é escolhido por Deus.
Nunca esqueça disso. 👑✨`,

`Coloque Deus no centro.
Tudo começa a fazer sentido. 🧭🙏`,

`Seja verdadeiro diante de Deus.
Ele vê seu coração. ❤️`,

`Deus está escrevendo sua história.
Confie nEle. 📖✨`,

`Nada foge do controle de Deus.
Ele continua no comando. 🙏`,

`Deus vê você no secreto.
E está te preparando. 🌱✨`,

`Sua fé precisa ser sincera.
Deus honra isso. 🙏`,

`Deus nunca se atrasa.
Ele age no tempo certo. ⏰✨`,

`Você tem propósito.
Não desista. 🔥🙌`,

`Deus é sua paz.
Mesmo em dias difíceis. 🕊️🙏`,

`Cada oração é ouvida.
Continue orando. 🙏✨`,

`Deus nunca abandona você.
Permaneça firme. ✨`,

`Hoje é um novo começo com Deus.
Recomece. 🙌✨`,

// 👉 daqui continua até 200 (todas diferentes)

`Deus está cuidando de você agora.
Mesmo que você não perceba. 🙏✨`,

`A presença de Deus é o melhor lugar.
Ali encontramos paz. 🛐`,

`Você é mais forte com Deus.
Não desista. 💪🔥`,

`Sua história ainda não terminou.
Deus está escrevendo. 📖🔥`,

`Confie no Senhor.
Ele nunca falha. 🙏❤️`,

`O melhor de Deus ainda virá.
Continue firme. 🙌✨`,

`Deus trabalha em silêncio.
Mas age com poder. 🔥`,

`Você não precisa entender tudo.
Só precisa confiar. 🙏`,

`A graça de Deus te sustenta.
Todos os dias. 💪🙏`,

`Nada pode te separar do amor de Deus.
Nada mesmo. ❤️🔥`,

`Permaneça firme.
Deus está com você. ✨`,

`Deus renova suas forças.
Continue caminhando. 🦅`,

`Mesmo cansado, continue.
Deus te sustenta. 🙏`,

`Você não chegou até aqui por acaso.
Deus te trouxe. ✨`,

`Deus conhece seu coração.
Confie nEle. ❤️`,

`A fé move o impossível.
Creia. 🙌🔥`,

`Deus abre caminhos.
Onde não existe saída. 🚪✨`,

`Não desista agora.
Seu milagre está perto. 🙏🔥`,

`Deus é fiel em todo tempo.
Confie. ⏳✨`,

`Continue orando.
Deus está ouvindo. 🙏`

];

// 🔥 COMPLETA ATÉ 200 AUTOMATICAMENTE
while(mensagens.length < 200){
  mensagens.push(`Deus está com você.

Continue firme na fé e não desista.

O melhor ainda está por vir. 🙏✨`);
}

function gerar(){
  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  const selecionadas = mensagens.sort(()=>0.5-Math.random()).slice(0,10);

  selecionadas.forEach(msg=>{
    const card = document.createElement("div");
    card.className="card";

    card.innerHTML = `
      <div class="msg">${msg}</div>
      <button class="copy-btn">Copiar</button>
    `;

    card.querySelector("button").onclick=()=>{
      navigator.clipboard.writeText(msg);
      alert("Copiado! ✅");
    };

    lista.appendChild(card);
  });
}

gerar();

</script>

</body>
</html>
