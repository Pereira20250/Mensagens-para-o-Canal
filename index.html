<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mensagens Diárias</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#f59e0b" />

  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #fff7ed, #fde68a);
      min-height: 100vh;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 24px;
    }

    h1 {
      text-align: center;
      margin-bottom: 6px;
    }

    .subtitle {
      text-align: center;
      color: #555;
      margin-bottom: 16px;
    }

    .btn {
      display: block;
      margin: 0 auto 24px auto;
      padding: 12px 18px;
      border: none;
      border-radius: 12px;
      background: #f59e0b;
      color: white;
      font-size: 16px;
      cursor: pointer;
      font-weight: bold;
    }

    .btn:hover {
      opacity: 0.9;
    }

    .card {
      background: white;
      border-radius: 18px;
      padding: 18px;
      margin-bottom: 16px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
      animation: fadeUp 0.4s ease;
    }

    .msg {
      white-space: pre-line;
      line-height: 1.6;
      font-size: 17px;
      margin-bottom: 14px;
    }

    .copy-btn {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: none;
      background: #111827;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(15px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Mensagens Diárias ✨</h1>
    <p class="subtitle">10 mensagens longas prontas para WhatsApp</p>
    <button class="btn" onclick="gerar()">Gerar novas mensagens</button>

    <div id="lista"></div>
  </div>

    function embaralhar(array) {
      return [...array].sort(() => Math.random() - 0.5);
    }

    function gerar() {
      const lista = document.getElementById("lista");
      lista.innerHTML = "";

      const selecionadas = embaralhar(mensagensBase).slice(0, 10);

      selecionadas.forEach(msg => {
        const card = document.createElement("div");
        card.className = "card";

        const texto = document.createElement("div");
        texto.className = "msg";
        texto.textContent = msg;

        const btn = document.createElement("button");
        btn.className = "copy-btn";
        btn.textContent = "Copiar para WhatsApp";
        btn.onclick = () => {
          navigator.clipboard.writeText(msg);
          alert("Mensagem copiada! ✅");
        };

        card.appendChild(texto);
        card.appendChild(btn);
        lista.appendChild(card);
      });
    }

    gerar();

    // Service Worker simples (PWA)
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js").catch(() => {});
    }

</body>
</html>
